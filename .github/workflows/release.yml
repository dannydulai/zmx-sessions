name: Release

on:
  push:
    tags:
      - 'release-*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: zmx-sessions-linux-x64
          - os: ubuntu-latest
            target: bun-linux-arm64
            artifact: zmx-sessions-linux-arm64
          - os: macos-latest
            target: bun-darwin-x64
            artifact: zmx-sessions-darwin-x64
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: zmx-sessions-darwin-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - run: bun build src/index.ts --compile --target=${{ matrix.target }} --define "VERSION='v${GITHUB_REF_NAME#release-}'" --outfile zmx-sessions

      - name: Create tarball
        run: tar czf ${{ matrix.artifact }}.tar.gz zmx-sessions

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.tar.gz
          generate_release_notes: true
